<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#000000">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beautiful Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1600') center center/cover no-repeat;
transition:0.5s;
}
.login-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
text-align:center;
width:350px;
color:white;
box-shadow:0 8px 32px rgba(0,0,0,.25);
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
#error{margin-top:10px;color:#ffd1d1}
#successPage{display:none;text-align:center;color:white;padding:20px}
#successPage h1{margin-bottom:20px}
#successPage img{
max-width:90%;
width:700px;
border-radius:20px;
}
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}
#gameCanvas{
    touch-action:none;
}
</style>
</head>
<body id="bodyBg">

<div class="login-box" id="loginPage">
<h1>Login</h1>
<input type="text" id="playerName" placeholder="Your Name">
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<div id="successPage" style="display:none;text-align:center;color:white;padding:20px">
    <h1>LETS MAKE TIME PASS</h1>

    <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1200" alt="Friends">

    <br><br>

    <h2>Enter Pincode</h2>

    <input type="password" id="pincode" placeholder="Enter Pincode">

    <button onclick="checkPin()">Continue</button>

    <p id="pinError"></p>
</div>
 
<div id="gorillaPage" style="display:none;text-align:center;color:white;padding:20px">
    <h1>Final Stage</h1>

    <img
    src="https://images.unsplash.com/photo-1540573133985-87b6da6d54a9?w=1200"
    alt="Gorilla"
    style="max-width:90%;width:700px;border-radius:20px;animation:float 2s infinite;">

    <h2>Enter to Legend Snake</h2>

    <button onclick="startSnake()" style="padding:12px 25px;border:none;border-radius:10px;font-size:18px;cursor:pointer;">
        Enter
    </button>
</div>

<div id="snakePage" style="display:none;text-align:center;color:white;padding:20px">
    <h1>Legend Snake</h1>

    <canvas id="gameCanvas" width="400" height="400"
        style="background:black;border:3px solid white;">
    </canvas>

    <h2 id="score">Score: 0</h2>
<button onclick="restartGame()"
style="padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:16px;">
Restart Game
</button>

<button onclick="toggleMusic()">
Music On/Off
</button>

<h2>Leaderboard</h2>

<table id="leaderboardTable"
style="margin:auto;color:white;border-collapse:collapse;">
<tr>
<th style="border:1px solid white;padding:8px;">Rank</th>
<th style="border:1px solid white;padding:8px;">Name</th>
<th style="border:1px solid white;padding:8px;">Score</th>
</tr>
</table>

<button onclick="clearBoard()">
Clear Leaderboard
</button>

<button onclick="openGames()">
More Games
</button>

</div>

<script>
let currentPlayer = "";

let leaderboard =
JSON.parse(localStorage.getItem("leaderboard")) || []; 
function login(){

const name =
document.getElementById('playerName').value.trim();

const u =
document.getElementById('username').value;

const p =
document.getElementById('password').value;

if(name===""){
document.getElementById('error').innerText =
'Enter your name';
return;
}

if(u==='legend' && p==='legend123'){

document.getElementById("bgMusic").play();

currentPlayer = name;

document.getElementById('loginPage').style.display='none';
document.getElementById('successPage').style.display='block';

document.getElementById('bodyBg').style.background =
"url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1600') center center / cover no-repeat";

}else{

document.getElementById('error').innerText =
'Invalid username or password';

}
}
function checkPin(){

    const pin=document.getElementById('pincode').value;

    if(pin==='321'){
        document.getElementById('successPage').style.display='none';
        document.getElementById('gorillaPage').style.display='block';
        document.getElementById('bodyBg').style.background =
"url('https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=1600') center center / cover no-repeat";
document.getElementById('bodyBg').style.background =
"url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1600') center center / cover no-repeat";

    }else{
        document.getElementById('pinError').innerText='Wrong Pincode';
    }

}

function saveScore(name, score){

db.ref("leaderboard").push({
    name:name,
    score:score
});

}

function loadLeaderboard(){

db.ref("leaderboard").on("value",(snapshot)=>{

let data = snapshot.val();

let players = [];

if(data){
    for(let key in data){
        players.push(data[key]);
    }
}


players.sort((a,b)=>b.score-a.score);
players = players.slice(0,10);

const table =
document.getElementById("leaderboardTable");

table.innerHTML =
`
<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>
`;



players.forEach((player,index)=>{

table.innerHTML += `
<tr>
<td>
${index===0 ? "#1" :
  index===1 ? "#2" :
  index===2 ? "#3" :
  index+1}
</td>
<td>${player.name}</td>
<td>${player.score}</td>
</tr>
`;

});

});

}

function restartGame(){

document.getElementById('snakePage').style.display='none';

document.getElementById('snakePage').style.display='block';

startSnake();

}

function saveBest(name, score){

db.ref("bestscores/"+name).once("value")
.then(snapshot=>{

let oldScore = snapshot.val();

if(oldScore===null || score>oldScore){

db.ref("bestscores/"+name).set(score);

}

});

}


function clearBoard(){

let pass = prompt("Admin Password");

if(pass==="legendadmin"){

db.ref("leaderboard").remove();

}

}

function openGames(){

window.open(
"https://poki.com",
"_blank"
);

}


function toggleMusic(){

const music = document.getElementById("bgMusic");

if(music.paused){
    music.play();
}else{
    music.pause();
}

}


function startSnake(){

document.documentElement.requestFullscreen?.();
loadLeaderboard();
document.getElementById('bodyBg').style.background =
"url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=1600') center center / cover no-repeat";
document.getElementById('gorillaPage').style.display='none';
document.getElementById('snakePage').style.display='block';

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.style.touchAction = "none";

const box = 20;

let snake = [
    {x: 10 * box, y: 10 * box}
];

let food = {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
};

let score = 0;
let direction = "RIGHT";

document.getElementById("score").innerText = "Score: 0";

function changeDirection(event){

    if(event.key==="ArrowLeft" && direction!=="RIGHT")
        direction="LEFT";

    if(event.key==="ArrowUp" && direction!=="DOWN")
        direction="UP";

    if(event.key==="ArrowRight" && direction!=="LEFT")
        direction="RIGHT";

    if(event.key==="ArrowDown" && direction!=="UP")
        direction="DOWN";
}

document.addEventListener("keydown", changeDirection);

let startX = 0;
let startY = 0;

canvas.addEventListener("touchstart", function(e){

    e.preventDefault();

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

}, { passive:false });

canvas.addEventListener("touchmove", function(e){

    e.preventDefault();

}, { passive:false });

canvas.addEventListener("touchend", function(e){

    e.preventDefault();

    let endX = e.changedTouches[0].clientX;
    let endY = e.changedTouches[0].clientY;

    let dx = endX - startX;
    let dy = endY - startY;

    if(Math.abs(dx) > Math.abs(dy)){

        if(dx > 30 && direction !== "LEFT"){
            direction = "RIGHT";
        }

        if(dx < -30 && direction !== "RIGHT"){
            direction = "LEFT";
        }

    }else{

        if(dy > 30 && direction !== "UP"){
            direction = "DOWN";
        }

        if(dy < -30 && direction !== "DOWN"){
            direction = "UP";
        }
    }

}, { passive:false });

function draw(){

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,400,400);

   for(let i=0;i<snake.length;i++){

    ctx.fillStyle = (i===0) ? "#00ff00" : "#00aa00";

    ctx.beginPath();

    ctx.arc(
        snake[i].x + box/2,
        snake[i].y + box/2,
        box/2,
        0,
        Math.PI * 2
    );

    ctx.fill();
}


    ctx.fillStyle = "red";

ctx.beginPath();
ctx.arc(
food.x + box/2,
food.y + box/2,
box/2,
0,
Math.PI*2
);
ctx.fill();


    let snakeX = snake[0].x;
    let snakeY = snake[0].y;

    if(direction==="LEFT") snakeX -= box;
    if(direction==="RIGHT") snakeX += box;
    if(direction==="UP") snakeY -= box;
    if(direction==="DOWN") snakeY += box;

    if(snakeX===food.x && snakeY===food.y){

        score++;

        document.getElementById("score").innerText =
        "Score: " + score;

        food = {
            x: Math.floor(Math.random()*20)*box,
            y: Math.floor(Math.random()*20)*box
        };

    }else{
        snake.pop();
    }

    let newHead = {
        x: snakeX,
        y: snakeY
    };

    if(
        snakeX < 0 ||
        snakeY < 0 ||
        snakeX >= 400 ||
        snakeY >= 400
    ){
        clearInterval(game);
        saveScore(currentPlayer, score);
        saveBest(currentPlayer, score);

alert(
"Game Over!\nPlayer: " +
currentPlayer +
"\nScore: " +
score
);

        return;
    }

    snake.unshift(newHead);
}

let game = setInterval(draw, 200);

}
</script>
